<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Εκπαιδευτική Εκδρομή Γ' Γυμνασίου στην Κέρκυρα</title>
  <style>
    :root {
      --bg: #f7f3ee;
      --card: #ffffff;
      --ink: #2f2623;
      --muted: #6f625d;
      --line: #e5d7d0;
      --accent: #7b3243;
      --accent-soft: #f3e4e9;
      --warn: #a63d40;
      --warn-soft: #fdebec;
      --room: #efe8ff;
      --shadow: 0 8px 22px rgba(47,38,35,.08);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    .shell {
      max-width: 920px;
      margin: 0 auto;
      padding: 14px 12px 80px;
    }
    .top {
      position: sticky;
      top: 0;
      z-index: 20;
      background: linear-gradient(180deg, rgba(247,243,238,.98), rgba(247,243,238,.94));
      backdrop-filter: blur(8px);
      padding: 10px 0 12px;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 1.15rem;
      line-height: 1.25;
      color: var(--accent);
    }
    .subtitle {
      margin: 0 0 10px;
      font-size: .9rem;
      line-height: 1.35;
      color: var(--muted);
    }

    .header-image-wrap {
      margin: 8px 0 10px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      background: #fff;
    }
    .header-image {
      display: block;
      width: 100%;
      height: 118px;
      object-fit: cover;
      object-position: center;
      opacity: .92;
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr 140px;
      gap: 8px;
      margin-bottom: 8px;
    }
    input[type="search"], select, .room-value {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      color: var(--ink);
      padding: 12px 14px;
      font-size: .97rem;
      outline: none;
    }
    .room-value {
      padding: 10px 12px;
      font-size: .92rem;
      background: var(--accent-soft);
      border: 1px solid #dfb8c4;
      border-radius: 12px;
      color: var(--accent);
      font-weight: 700;
      min-height: 42px;
      display: flex;
      align-items: center;
    }
    .view-switch {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 8px;
    }
    .btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: .92rem;
      cursor: pointer;
    }
    .btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .btn.print {
      background: var(--accent-soft);
      border-color: #dfb8c4;
      color: var(--accent);
      font-weight: 600;
    }
    .print-note {
      font-size: .83rem;
      color: var(--muted);
      margin: 0 0 10px;
    }
    .list { display: grid; gap: 12px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
    }
    .card.flagged {
      border-color: #efb2b5;
      background: linear-gradient(180deg, #fff, var(--warn-soft));
    }
    .head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }
    .student {
      font-weight: 800;
      font-size: 1rem;
      line-height: 1.25;
    }
    .pill {
      flex-shrink: 0;
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid #dfb8c4;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: .82rem;
      font-weight: 700;
    }
    .room-wrap {
      display: grid;
      grid-template-columns: 90px 1fr;
      align-items: center;
      gap: 8px;
      margin: 6px 0 10px;
    }
    .room-label {
      font-size: .86rem;
      color: var(--muted);
      font-weight: 700;
    }
    .flag-box {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 12px;
      background: var(--warn-soft);
      color: #7c2024;
      border: 1px solid #efb2b5;
      font-size: .9rem;
      font-weight: 600;
    }
    .guardian-block {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 11px 12px;
      margin-top: 10px;
      background: #fffdfa;
    }
    .guardian-slot {
      font-size: .84rem;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .meta {
      display: grid;
      gap: 4px;
      font-size: .92rem;
    }
    .meta div { line-height: 1.35; }
    .label {
      color: var(--muted);
      font-weight: 700;
    }
    .section {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px dashed var(--line);
      display: grid;
      gap: 6px;
      font-size: .92rem;
    }
    .group-title {
      margin: 18px 0 8px;
      padding: 10px 12px;
      border-radius: 14px;
      background: var(--room);
      border: 1px solid #d7cbff;
      color: #4c2f93;
      font-weight: 800;
      position: sticky;
      top: 132px;
      z-index: 5;
    }
    .empty {
      padding: 18px 14px;
      border: 1px dashed var(--line);
      border-radius: 16px;
      color: var(--muted);
      background: rgba(255,255,255,.7);
      text-align: center;
    }
    .hidden { display: none !important; }
    @media (max-width: 560px) {
      .toolbar { grid-template-columns: 1fr; }
      .head { flex-direction: column; align-items: flex-start; }
      .group-title { top: 168px; }
    }
    @media print {
      .header-image-wrap { margin: 6px 0 8px; box-shadow: none; }
      .header-image { height: 90px; }
      body { background: #fff; }
      .top, .view-switch, .toolbar, .print-note { display: none !important; }
      .shell { max-width: none; padding: 0; }
      .card { box-shadow: none; break-inside: avoid; page-break-inside: avoid; }
      .group-title { position: static; margin-top: 16px; }
      .room-value { border: 0; padding: 0; background: transparent; color: #000; font-weight: 700; }

      .footer { margin: 24px 0 8px; text-align: center; font-size: 13px; color: #6b7280; }
    }
  </style>
</head>

  <div class="shell">
    <div class="top">
      <h1>Εκπαιδευτική Εκδρομή Γ' Γυμνασίου στην Κέρκυρα</h1>
      <div class="subtitle">Δημιουργία Παναγιώτης Δόμβρος, Διευθυντής 1ου Γυμνασίου Πυλαίας</div>
      <div class="header-image-wrap">

        <button class="btn print" id="printBtn">Εκτύπωση τρέχουσας προβολής</button>

    <div id="alphaView" class="list"></div>

    <footer class="footer"><strong>Δημιουργία: Παναγιώτης Δόμβρος, Διευθυντής 1ου Γυμνασίου Πυλαίας</strong></footer>
  </div>

    const classes = ["Γ1", "Γ2", "Γ3", "Γ4", "Γ5"];
    let currentView = 'alpha';

const classFilter = document.getElementById('classFilter');
    classFilter.innerHTML = ['<option value="">Όλοι</option>']
      .concat(classes.map(c => `<option value="${c}">${c}</option>`))
      .join('');

    function esc(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function normalizeForSearch(text) {
      return (text || '')
        .toString()
        .toLowerCase()
        .normalize('NFD')
        .replace(/[̀-ͯ]/g, '');
    }

    function naturalRoomSort(a, b) {
      const aa = (a || 'Χωρίς δωμάτιο').trim();
      const bb = (b || 'Χωρίς δωμάτιο').trim();
      const parse = value => {
        const match = value.match(/^(Τετράκλινο|Τρίκλινο|Δίκλινο)\s+(\d+)$/);
        if (!match) return null;
        const typeOrder = { 'Τετράκλινο': 1, 'Τρίκλινο': 2, 'Δίκλινο': 3 };
        return { type: typeOrder[match[1]], number: Number(match[2]) };
      };
      const pa = parse(aa);
      const pb = parse(bb);
      if (pa && pb) return pa.type - pb.type || pa.number - pb.number;
      if (pa) return -1;
      if (pb) return 1;
      if (aa === 'Χωρίς δωμάτιο') return 1;
      if (bb === 'Χωρίς δωμάτιο') return -1;
      return aa.localeCompare(bb, 'el');
    }

    function cardHTML(student) {
      const guardians = student.guardians.filter(g => g.name || g.phone || g.email || g.relation);
      const guardianHTML = guardians.length
        ? guardians.map(g => `
            <div class="guardian-block">
              <div class="guardian-slot">${esc(g.slot)}</div>
              <div class="meta">
                ${g.name ? `<div><span class="label">Όνομα:</span> ${esc(g.name)}</div>` : ''}
                ${g.relation ? `<div><span class="label">Σχέση:</span> ${esc(g.relation)}</div>` : ''}
                ${g.phone ? `<div><span class="label">Τηλέφωνο:</span> ${esc(g.phone)}</div>` : ''}
                ${g.email ? `<div><span class="label">E-mail:</span> ${esc(g.email)}</div>` : ''}
              </div>
            </div>`).join('')
        : '';

      const extraRows = [];
      if (student.studentPhone) extraRows.push(`<div><span class="label">Τηλέφωνο μαθητή/μαθήτριας:</span> ${esc(student.studentPhone)}</div>`);
      if (student.health) extraRows.push(`<div><span class="label">Υγεία:</span> ${esc(student.health)}</div>`);
      if (student.medication) extraRows.push(`<div><span class="label">Αγωγή:</span> ${esc(student.medication)}</div>`);
      if (student.comments) extraRows.push(`<div><span class="label">Σχόλια:</span> ${esc(student.comments)}</div>`);

      return `
        <article class="card ${student.missing ? 'flagged' : ''}" data-id="${esc(student.id)}">
          <div class="head">
            <div class="student">${esc(student.studentName)}</div>
            <div class="pill">${esc(student.className)}</div>
          </div>
          <div class="room-wrap">
            <div class="room-label">Δωμάτιο</div>
            <div class="room-value">${esc(student.room || '—')}</div>
          </div>
          ${student.missing ? `<div class="flag-box">${esc(student.flagText)}</div>` : ''}
          ${guardianHTML}
          ${extraRows.length ? `<div class="section">${extraRows.join('')}</div>` : ''}
        </article>`;
    }

    function activeFilters() {
      return {
        query: normalizeForSearch(document.getElementById('searchInput').value),
        className: classFilter.value || ''
      };
    }

    function matchesFilters(student, filters) {
      if (filters.className && student.className !== filters.className) return false;
      if (!filters.query) return true;
      const haystack = normalizeForSearch([
        student.studentName,
        student.className,
        student.room,
        student.studentPhone,
        student.health,
        student.medication,
        student.comments,
        ...(student.guardians || []).flatMap(g => [g.name, g.relation, g.phone, g.email])
      ].join(' '));
      return haystack.includes(filters.query);
    }

    function filteredStudents() {
      const filters = activeFilters();
      return students.filter(s => matchesFilters(s, filters));
    }

    function renderAlpha() {
      const target = document.getElementById('alphaView');
      const rows = filteredStudents();
      if (!rows.length) {
        target.innerHTML = '<div class="empty">Δεν βρέθηκαν αποτελέσματα.</div>';
        return;
      }
      target.innerHTML = rows.map(cardHTML).join('');
    }

    function renderRoom() {
      const target = document.getElementById('roomView');
      const rows = filteredStudents().slice().sort((a, b) => {
        const r = naturalRoomSort(a.room, b.room);
        if (r !== 0) return r;
        return a.studentName.localeCompare(b.studentName, 'el');
      });
      if (!rows.length) {
        target.innerHTML = '<div class="empty">Δεν βρέθηκαν αποτελέσματα.</div>';
        return;
      }
      const groups = new Map();
      rows.forEach(s => {
        const key = s.room && s.room.trim() ? s.room.trim() : 'Χωρίς δωμάτιο';
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(s);
      });
      const orderedKeys = Array.from(groups.keys()).sort(naturalRoomSort);
      target.innerHTML = orderedKeys.map(key => {
        const cards = groups.get(key)
          .slice()
          .sort((a, b) => a.studentName.localeCompare(b.studentName, 'el'))
          .map(cardHTML)
          .join('');
        return `<section><div class="group-title">Δωμάτιο: ${esc(key)}</div><div class="list">${cards}</div></section>`;
      }).join('');
    }


    function switchView(view) {
      currentView = view;
      document.querySelectorAll('[data-view]').forEach(btn => btn.classList.toggle('active', btn.dataset.view === view));
      document.getElementById('alphaView').classList.toggle('hidden', view !== 'alpha');
      document.getElementById('roomView').classList.toggle('hidden', view !== 'room');
    }

    function renderAll() {
      renderAlpha();
      renderRoom();
      switchView(currentView);
    }

    document.getElementById('searchInput').addEventListener('input', renderAll);
    classFilter.addEventListener('change', renderAll);
    document.querySelectorAll('[data-view]').forEach(btn => btn.addEventListener('click', () => switchView(btn.dataset.view)));
    document.getElementById('printBtn').addEventListener('click', () => window.print());

    renderAll();
  </script>
